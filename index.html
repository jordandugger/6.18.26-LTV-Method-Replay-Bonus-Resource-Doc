  <head>
      <meta charset="UTF-8" />

      <title>Prospect Audits</title>
    <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }

          body {
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                  background: #f4f6f9;
                  color: #1a1a2e;
                  min-height: 100vh;
          }

          header {
                  background: #1a1a2e;
                  color: #fff;
                  padding: 48px 32px 40px;
                  text-align: center;
          }

          header h1 {
                  font-size: 2.4rem;
                  font-weight: 700;
                  letter-spacing: -0.5px;
                  margin-bottom: 10px;
          }

          header p {
                  font-size: 1.05rem;
                  color: #a0aec0;
          }

          main {
                  max-width: 960px;
                  margin: 48px auto;
                  padding: 0 24px;
          }

          .section-title {
                  font-size: 0.78rem;
                  font-weight: 600;
                  letter-spacing: 0.1em;
                  text-transform: uppercase;
                  color: #718096;
                  margin-bottom: 20px;
          }

          .cards {
                  display: grid;
                  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                  gap: 20px;
          }

          .card {
                  background: #fff;
                  border: 1px solid #e2e8f0;
                  border-radius: 10px;
                  padding: 28px 24px;
                  text-decoration: none;
                  color: inherit;
                  transition: box-shadow 0.18s ease, transform 0.18s ease;
                  display: flex;
                  flex-direction: column;
                  gap: 8px;
          }

          .card:hover {
                  box-shadow: 0 6px 24px rgba(0,0,0,0.10);
                  transform: translateY(-2px);
          }

          .card-label {
                  font-size: 0.72rem;
                  font-weight: 600;
                  letter-spacing: 0.08em;
                  text-transform: uppercase;
                  color: #a0aec0;
          }

          .card h2 {
                  font-size: 1.2rem;
                  font-weight: 700;
                  color: #1a1a2e;
          }

          .card p {
                  font-size: 0.9rem;
                  color: #718096;
                  line-height: 1.5;
          }

          .card-arrow {
                  margin-top: auto;
                  padding-top: 16px;
                  font-size: 1.1rem;
                  color: #a0aec0;
          }

          footer {
                  text-align: center;
                  padding: 40px 24px;
                  font-size: 0.82rem;
                  color: #a0aec0;
          }
        </style>
  </head>
  <body>

      <header>
            <h1>Prospect Audits</h1>
          <p>Click a card below to view an audit report.</p>
      </header>
  
    <main>
          <p class="section-title">Audits</p>p>

                            <p>Full audit report for Lee &amp; Price.</p>
                            <div class="card-arrow">&#8594;</div>div>
                  </a>a>

          </div>div>
    </main>

      <footer>Prospect Audits &mdash; Internal Use Only</footer>
